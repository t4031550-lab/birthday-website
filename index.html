<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Celebration</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

<button id="celebrateBtn" class="celebrate-btn">Celebrate!</button>

<div id="wishContainer">
  <h1 id="wishText">Happy Birthday! 🎂❤️</h1>

  <img id="birthdayImg"
  src="https://i.postimg.cc/x1hnBHfn/Beige-and-Pink-Floral-Scrapbook.jpg"
  alt="Birthday Image">
</div>

<!-- Birthday Audio -->
<audio id="wishAudio"
src="https://github.com/user-attachments/files/25929913/song.mp3"
autoplay loop>
</audio>

<!-- Confetti Sound -->
<audio id="confettiAudio"
src="https://github.com/user-attachments/files/25929916/confetti.mp3"
preload="auto">
</audio>

<!-- Confetti Library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
